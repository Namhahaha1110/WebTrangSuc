services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sportsstore-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sportsstore_sql_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  sportsstore_sql_data:
